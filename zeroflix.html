<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Movie - Black Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            background-color: #141414;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        /* ===== LOGO NETFLIX EFFECT (ADA KECIK ADA BESAR + LENGKUNG) ===== */
        .logo {
            display: flex;
            align-items: flex-end;
            font-family: 'Arial Black', Impact, sans-serif;
            font-weight: 900;
            font-size: 2.3rem;
            color: #e50914;
            text-transform: uppercase;
            letter-spacing: -2px; 
            padding: 5px 10px;
            position: relative;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 86%, 0% 100%);
            background: transparent;
        }

        .logo span {
            display: inline-block;
            transform-origin: bottom center;
            line-height: 0.9;
        }

        .logo span:nth-child(1) { transform: scaleY(1.3); }
        .logo span:nth-child(2) { transform: scaleY(1.1); }
        .logo span:nth-child(3) { transform: scaleY(0.98); }
        .logo span:nth-child(4) { transform: scaleY(0.93); }
        .logo span:nth-child(5) { transform: scaleY(0.93); }
        .logo span:nth-child(6) { transform: scaleY(0.98); }
        .logo span:nth-child(7) { transform: scaleY(1.1); }
        .logo span:nth-child(8) { transform: scaleY(1.3); }

        .nav-actions {
            display: flex;
            gap: 15px;
            font-size: 1.2rem;
            align-items: center;
        }

        .nav-btn {
            cursor: pointer;
            user-select: none;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .section-title {
            font-size: 1.1rem;
            border-left: 4px solid #e50914;
            padding-left: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ===== GRID FIX UNTUK TELEFON & PC ===== */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background-color: #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #252525;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: scale(1.04);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
            border-color: #e50914;
        }

        .poster-wrapper {
            position: relative;
            width: 100%;
            padding-top: 140%;
            background-color: #222;
        }

        .poster-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .quality-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: #ffcc00;
            color: #000;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 3px;
            z-index: 2;
        }

        .movie-details {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            padding: 25px 10px 10px 10px;
            text-align: center;
        }

        .movie-title {
            margin: 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== MODAL & VIDEO STYLES ===== */
        .player-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .player-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            width: 90%;
            max-width: 850px;
            position: relative;
            transition: max-width 0.3s ease, width 0.3s ease;
        }

        .modal-content.fullscreen-mode {
            width: 100% !important;
            max-width: 100% !important;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #000;
        }

        .modal-content.fullscreen-mode .video-container {
            padding-bottom: 0;
            height: calc(100vh - 50px);
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: bold;
            z-index: 1001;
        }

        .close-btn:hover {
            color: #e50914;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background-color: #000;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 2px solid #333;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-controls {
            background-color: #141414;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border: 2px solid #333;
            border-top: none;
            border-radius: 0 0 6px 6px;
            position: relative;
            z-index: 15;
        }

        .speed-buttons, .screen-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .control-btn {
            background-color: #252525;
            color: #fff;
            border: 1px solid #444;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .control-btn:hover, .control-btn.active {
            background-color: #e50914;
            border-color: #e50914;
        }

        .control-label {
            font-size: 0.75rem;
            color: #aaa;
        }

        /* ===== DASHBOARD PANEL STYLES ===== */
        .dashboard-panel {
            background-color: #141414;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            display: none; /* Sembunyi secara default */
        }

        .dashboard-title {
            color: #e50914;
            margin-top: 0;
            font-size: 1.3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #ccc;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background-color: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .dashboard-btn {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        .dashboard-btn:hover {
            background-color: #b80710;
        }

        .manage-list {
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .manage-actions {
            display: flex;
            gap: 8px;
        }

        .edit-btn {
            background: #3399ff;
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 0.8rem;
        }

        .edit-btn:hover {
            background: #0077e6;
        }

        .delete-btn {
            background: #ff3333;
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 0.8rem;
        }

        /* ===== DESIGN STYLES SUIS ON/OFF ===== */
        .security-box {
            background: #1c1c1c;
            border: 1px dashed #e50914;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .switch-container {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background-color: #444;
            border-radius: 20px;
            transition: background-color 0.3s;
            margin-left: 10px;
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: white;
            top: 3px;
            left: 3px;
            transition: transform 0.3s;
        }

        #securityToggleCheckbox {
            display: none;
        }

        #securityToggleCheckbox:checked + .toggle-switch {
            background-color: #e50914;
        }

        #securityToggleCheckbox:checked + .toggle-switch::before {
            transform: translateX(24px);
        }

        .status-txt {
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* ===== SYSTEM RESPONSIVE TELEFON ===== */
        @media (max-width: 480px) {
            .movie-grid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 10px;
            }
            .movie-card {
                width: 100%;
            }
            .player-controls {
                padding: 8px 10px;
            }
            .control-btn {
                padding: 5px 8px;
                font-size: 0.75rem;
            }
        }

        /* ===== SEARCH BOX ===== */
        #searchBox {
            display: none;
            text-align: center;
            margin: 15px;
        }

        #searchBox input {
            padding: 10px;
            width: 80%;
            max-width: 400px;
            border-radius: 6px;
            border: none;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
        <span>Z</span><span>e</span><span>r</span><span>o</span><span>F</span><span>l</span><span>i</span><span>x</span>
    </div>
    <div class="nav-actions">
        <div id="searchToggle" class="nav-btn">🔍</div>
        <div id="adminToggle" class="nav-btn" title="Admin Dashboard">⚙️</div>
    </div>
</header>

<div id="searchBox">
    <input id="searchInput" type="text" placeholder="Cari movie...">
</div>

<div class="main-container">

    <div id="dashboardPanel" class="dashboard-panel">
        <h3 class="dashboard-title">
            <span>🛠️ ZeroFlix Admin Dashboard</span>
            <button class="delete-btn" onclick="logoutAdmin()" style="background:#444;">Log Keluar</button>
        </h3>

        <div class="security-box">
            <div>
                <span style="color: #ccc; font-size: 0.85rem; display: block; margin-bottom: 2px;">Sistem Keselamatan:</span>
                <span style="font-size: 0.95rem; font-weight: 600;">🔒 Anti-Inspect Element</span>
            </div>
            <label class="switch-container">
                <span id="statusIndicator" class="status-txt" style="color: #ff3333;">OFF</span>
                <input type="checkbox" id="securityToggleCheckbox" onchange="updateSecuritySwitch()">
                <div class="toggle-switch"></div>
            </label>
        </div>

        <div class="form-group">
            <label>Tajuk Movie:</label>
            <input type="text" id="mTitle" placeholder="Contoh: Spider-Man No Way Home (2021)">
        </div>
        <div class="form-group">
            <label>ID Google Drive Video Link:</label>
            <input type="text" id="mVideo" placeholder="Masukkan ID Video Drive sahaja">
        </div>
        <div class="form-group">
            <label>Link Gambar Poster / Fail Nama Gambar:</label>
            <input type="text" id="mPoster" placeholder="Contoh: poster.jpg atau https://linkgambar.com/poster.jpg">
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button class="dashboard-btn" id="addMovieBtn" onclick="addMovieLive()">➕ Tambah Movie Baru</button>
            <button class="dashboard-btn" id="cancelEditBtn" onclick="cancelEditMode()" style="background: #555; display: none;">❌ Batal</button>
        </div>

        <div class="manage-list">
            <h4>Senarai Urus & Padam Movie:</h4>
            <div id="adminMovieList"></div>
        </div>
    </div>

    <div class="section-title">
        <span>Latest Movies ></span>
    </div>

    <div class="movie-grid" id="movieGridContainer">
    </div>
</div>

<div class="player-modal" id="playerModal">
    <div class="modal-content" id="modalContent">
        <button class="close-btn" id="closeBtn">×</button>
        <div class="video-container">
            <iframe id="videoIframe" allow="autoplay; fullscreen"></iframe>
        </div>
        <div class="player-controls">
            <div class="speed-buttons">
                <span class="control-label">Speed:</span>
                <button class="control-btn" onclick="changeSpeed(0.5, this)">0.5x</button>
                <button class="control-btn active" onclick="changeSpeed(1, this)">1x</button>
                <button class="control-btn" onclick="changeSpeed(1.5, this)">1.5x</button>
            </div>
            <div class="screen-buttons">
                <button class="control-btn" id="fullscreenBtn">📺 Fullscreen</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBiiZhKQTBA9KFVnadT5VoDuaVoP5pHMQ8",
    authDomain: "zeroflix-47e3c.firebaseapp.com",
    databaseURL: "https://zeroflix-47e3c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "zeroflix-47e3c",
    storageBucket: "zeroflix-47e3c.appspot.com",
    messagingSenderId: "329931835631",
    appId: "1:329931835631:web:e614bb1ad1a05262caf31a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const moviesRef = ref(db, 'movies');

let isAntiInspectActive = localStorage.getItem('zeroflix_anti_inspect') === 'true';
// VARIABLE BARU: Menyimpan Firebase Key untuk rujukan kemas kini
let currentEditKey = null;

const movieGridContainer = document.getElementById('movieGridContainer');
const adminMovieList = document.getElementById('adminMovieList');
const playerModal = document.getElementById('playerModal');
const modalContent = document.getElementById('modalContent');
const videoIframe = document.getElementById('videoIframe');
const closeBtn = document.getElementById('closeBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const dashboardPanel = document.getElementById('dashboardPanel');
const adminToggle = document.getElementById('adminToggle');
const securityToggleCheckbox = document.getElementById('securityToggleCheckbox');
const statusIndicator = document.getElementById('statusIndicator');

// REFERENCE BARU: Ambil element butang untuk manipulasi teks semasa edit
const addMovieBtn = document.getElementById('addMovieBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');

securityToggleCheckbox.checked = isAntiInspectActive;
renderSwitchStatus(isAntiInspectActive);

function renderSwitchStatus(active) {
    if (active) {
        statusIndicator.innerText = "ON";
        statusIndicator.style.color = "#00ff00";
    } else {
        statusIndicator.innerText = "OFF";
        statusIndicator.style.color = "#ff3333";
    }
}

function cleanDriveId(input) {
    if(input.includes('/d/')) {
        return input.split('/d/')[1].split('/')[0];
    }
    return input;
}

// FUNGSI DIUBAH: Menggunakan format thumbnail berbanding uc?export=view yang selalu disekat Google
function cleanPosterUrl(input) {
    if (input.includes('drive.google.com') || input.includes('googleusercontent.com')) {
        let id = "";
        if (input.includes('id=')) {
            id = input.split('id=')[1].split('&')[0];
        } else if (input.includes('/d/')) {
            id = input.split('/d/')[1].split('/')[0];
        } else if (input.includes('/file/d/')) {
            id = input.split('/file/d/')[1].split('/')[0];
        }
        if (id) {
            return `https://drive.google.com/thumbnail?sz=w600&id=${id}`;
        }
    }
    return input;
}

window.updateSecuritySwitch = function() {
    isAntiInspectActive = securityToggleCheckbox.checked;
    localStorage.setItem('zeroflix_anti_inspect', isAntiInspectActive);
    renderSwitchStatus(isAntiInspectActive);
}

onValue(moviesRef, (snapshot) => {
    movieGridContainer.innerHTML = "";
    adminMovieList.innerHTML = "";
    
    if (snapshot.exists()) {
        const data = snapshot.val();
        
        Object.keys(data).forEach((firebaseKey) => {
            const movie = data[firebaseKey];
            
            const card = document.createElement('div');
            card.className = "movie-card";
            card.setAttribute('data-video', movie.video);
            card.innerHTML = `
                <div class="quality-badge">MOVIE</div>
                <div class="poster-wrapper">
                    <img src="${movie.poster}">
                </div>
                <div class="movie-details">
                    <h3 class="movie-title">${movie.title}</h3>
                </div>
            `;
            
            card.addEventListener('click', () => {
                videoIframe.src = `https://drive.google.com/file/d/${movie.video}/preview`;
                playerModal.classList.add('active');
            });
            movieGridContainer.appendChild(card);

            // DIUBAH: Menambah butang Edit di sebelah butang Padam dalam senarai urus
            const manageItem = document.createElement('div');
            manageItem.className = "manage-item";
            manageItem.innerHTML = `
                <span>${movie.title}</span>
                <div class="manage-actions">
                    <button class="edit-btn" onclick="prepareEditMovie('${firebaseKey}', '${escapeHtml(movie.title)}', '${movie.video}', '${escapeHtml(movie.poster)}')">✏️ Edit</button>
                    <button class="delete-btn" onclick="deleteMovieLive('${firebaseKey}')">🗑️ Padam</button>
                </div>
            `;
            adminMovieList.appendChild(manageItem);
        });
    } else {
        movieGridContainer.innerHTML = "<p style='padding:20px; color:#aaa;'>Tiada movie dijumpai dalam database.</p>";
    }
});

// HELPER FUNCTION BARU: Mengelakkan masalah tanda kutip (string error) dalam parameter HTML button
function escapeHtml(string) {
    return String(string).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// FUNGSI BARU: Untuk menarik maklumat asal ke form input apabila butang Edit ditekan
window.prepareEditMovie = function(key, title, video, poster) {
    currentEditKey = key;
    document.getElementById('mTitle').value = title;
    document.getElementById('mVideo').value = video;
    document.getElementById('mPoster').value = poster;
    
    addMovieBtn.innerText = "💾 Kemas Kini Movie";
    cancelEditBtn.style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

// FUNGSI BARU: Membatalkan mod edit dan mengosongkan form input semula
window.cancelEditMode = function() {
    currentEditKey = null;
    document.getElementById('mTitle').value = "";
    document.getElementById('mVideo').value = "";
    document.getElementById('mPoster').value = "";
    
    addMovieBtn.innerText = "➕ Tambah Movie Baru";
    cancelEditBtn.style.display = "none";
};

window.addMovieLive = function() {
    const title = document.getElementById('mTitle').value.trim();
    let video = document.getElementById('mVideo').value.trim();
    let poster = document.getElementById('mPoster').value.trim();

    if (title === "" || video === "" || poster === "") {
        alert("Sila isi semua ruangan maklumat movie!");
        return;
    }

    video = cleanDriveId(video);
    poster = cleanPosterUrl(poster);

    if (currentEditKey) {
        // PROSES KEMAS KINI (EDIT): Menggunakan Firebase set() pada key sedia ada
        const editRef = ref(db, `movies/${currentEditKey}`);
        set(editRef, { title, video, poster })
        .then(() => {
            alert("Movie berjaya dikemaskini!");
            cancelEditMode();
        })
        .catch((error) => {
            alert("Gagal mengemaskini movie: " + error.message);
        });
    } else {
        // PROSES ASAL (TAMBAH BARU): Menambah data menggunakan push()
        const newMovieRef = push(moviesRef);
        set(newMovieRef, { title, video, poster })
        .then(() => {
            document.getElementById('mTitle').value = "";
            document.getElementById('mVideo').value = "";
            document.getElementById('mPoster').value = "";
            alert("Movie berjaya ditambah ke Firebase!");
        })
        .catch((error) => {
            alert("Gagal menambah movie: " + error.message);
        });
    }
};

window.deleteMovieLive = function(firebaseKey) {
    if (confirm("Adakah anda pasti mahu memadam movie ini?")) {
        // Batalkan mod edit jika movie yang sedang diedit didelete serentak
        if (currentEditKey === firebaseKey) cancelEditMode();
        
        const specificMovieRef = ref(db, `movies/${firebaseKey}`);
        remove(specificMovieRef)
        .then(() => {
            alert("Movie berjaya dipadam dari database!");
        })
        .catch((error) => {
            alert("Gagal memadam movie: " + error.message);
        });
    }
}

adminToggle.addEventListener('click', () => {
    if (dashboardPanel.style.display === "block") {
        dashboardPanel.style.display = "none";
    } else {
        const password = prompt("Masukkan Kata Laluan Admin:");
        if (btoa(password) === "SXJzeWFkNjc2Nw==") {
            dashboardPanel.style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else if (password !== null) {
            alert("Kata laluan salah! Akses ditolak.");
        }
    }
});

window.logoutAdmin = function() {
    dashboardPanel.style.display = "none";
    cancelEditMode(); // Kosongkan form jika terkeluar dari dashboard
}

window.resetPlayer = function() {
    playerModal.classList.remove('active');
    modalContent.classList.remove('fullscreen-mode');
    videoIframe.src = "";
    document.querySelectorAll('.speed-buttons .control-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.speed-buttons .control-btn')[1].classList.add('active');
}

closeBtn.addEventListener('click', resetPlayer);
playerModal.addEventListener('click', (e) => { if (e.target === playerModal) resetPlayer(); });

window.changeSpeed = function(speed, element) {
    document.querySelectorAll('.speed-buttons .control-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    alert(`Untuk memainkan pada kelajuan ${speed}x:\nSila klik ikon Tetapan (⚙️) di dalam paparan video dan pilih 'Playback speed'.`);
}

fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
        playerModal.requestFullscreen().then(() => {
            modalContent.classList.add('fullscreen-mode');
        }).catch(err => {
            modalContent.classList.toggle('fullscreen-mode');
        });
    } else {
        document.exitFullscreen();
    }
});

document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) modalContent.classList.remove('fullscreen-mode');
});

const searchToggle = document.getElementById('searchToggle');
const searchBox = document.getElementById('searchBox');
const searchInput = document.getElementById('searchInput');

searchToggle.addEventListener('click', () => {
    searchBox.style.display = searchBox.style.display === "block" ? "none" : "block";
    searchInput.focus();
});

searchInput.addEventListener('input', () => {
    const keyword = searchInput.value.toLowerCase();
    document.querySelectorAll('.movie-card').forEach(card => {
        const title = card.querySelector('.movie-title').innerText.toLowerCase();
        card.style.display = title.includes(keyword) ? "block" : "none";
    });
});

document.addEventListener('contextmenu', (e) => {
    if (isAntiInspectActive) {
        e.preventDefault();
    }
});

document.addEventListener('keydown', (e) => {
    if (!isAntiInspectActive) return;

    if (e.key === "F12") {
        e.preventDefault();
    }
    if (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "j" || e.key === "J" || e.key === "i")) {
        e.preventDefault();
    }
    if (e.ctrlKey && (e.key === "u" || e.key === "U")) {
        e.preventDefault();
    }
});
</script>

</body>
</html>
